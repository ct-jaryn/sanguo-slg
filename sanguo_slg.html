<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三国风云·轻量 SLG</title>
  <style>
    :root {
      --bg: #f5e6c8;
      --panel: #fff8e7;
      --border: #8b4513;
      --accent-red: #c41e3a;
      --accent-green: #1a5c1a;
      --accent-blue: #2980b9;
      --accent-purple: #8e44ad;
      --accent-orange: #e67e22;
      --text: #3d2b1f;
      --muted: #6d5a4b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }
    header {
      background: var(--panel);
      border-bottom: 2px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { margin: 0; font-size: 1.3rem; color: var(--accent-red); }
    .top-resources { display: flex; gap: 16px; flex-wrap: wrap; }
    .res-item { font-weight: bold; }
    .main { display: flex; flex: 1; overflow: hidden; }
    aside {
      width: 160px;
      background: var(--panel);
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    aside button {
      padding: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    aside button:hover { background: #f0dcc0; }
    aside button.active { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }
    #content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: var(--bg);
    }
    #log-panel {
      height: 160px;
      background: var(--panel);
      border-top: 2px solid var(--border);
      padding: 8px 16px;
      overflow-y: auto;
    }
    #log-panel h3 { margin: 0 0 6px; font-size: 1rem; }
    .log-entry { margin: 2px 0; font-size: 0.85rem; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(61,43,31,0.15);
    }
    .card h3 { margin: 0 0 8px; color: var(--accent-red); }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    button.action {
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 4px;
      cursor: pointer;
      margin: 4px 4px 4px 0;
    }
    button.action:hover { background: #f0dcc0; }
    button.action:disabled { opacity: 0.5; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border: 1px solid var(--border); padding: 6px; text-align: center; }
    th { background: var(--bg); }
    .faction-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 4px; }
    .skill-tag { background: var(--accent-green); color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 0.8rem; }
    .injured { color: var(--accent-red); font-weight: bold; }
    select, input { padding: 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal { background: var(--panel); border: 2px solid var(--border); border-radius: 8px; padding: 20px; max-width: 500px; width: 90%; }
    .modal h2 { margin-top: 0; color: var(--accent-red); }
    .map-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 10;
      background: #f9f1dc;
      margin: 0 auto;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .map-inner {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
    }
    .map-lines {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
    }
    .map-node {
      position: absolute;
      width: 56px;
      padding: 3px 1px;
      margin-left: -28px;
      margin-top: -12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 1px 4px rgba(61,43,31,0.18);
      background: var(--panel);
      z-index: 2;
      white-space: nowrap;
    }
    .map-node:hover { transform: scale(1.08); z-index: 3; background: #f0dcc0; }
    .map-node .n-name { font-size: 0.72rem; color: var(--text); }
    .map-node .n-troops { font-size: 0.6rem; color: var(--muted); }
    .map-region-label {
      position: absolute;
      font-size: 0.9rem;
      color: #a07c5a;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 0;
      pointer-events: none;
    }
    .map-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  </style>
</head>

      yuan: {id:'yuan',name:'袁绍',color:'#8e44ad',leader:'袁绍',personality:'expansion',ai:true,food:1400,gold:900,troops:800,morale:75,allies:[],eliminated:false},
      lv: {id:'lv',name:'吕布',color:'#e67e22',leader:'吕布',personality:'expansion',ai:true,food:1000,gold:800,troops:700,morale:60,allies:[],eliminated:false}
    };
  }

  let state;
  let selectedTab = 'internal';

  function initState() {
    const factions = makeFactions();
    const cities = makeCities();
    const generals = makeGenerals();
    const relations = {};
    const ids = Object.keys(factions);
    ids.forEach(a=>{relations[a]={};ids.forEach(b=>{relations[a][b]=a===b?100:(factions[a].ai&&factions[b].ai?30:20);});});
    state = {
      factions, cities, generals,
      relations,
      year: 1, month: 1, turn: 1,
      playerId: 'liu',
      logs: [],
      gameOver: false,
      winner: null,
      tech: {farmBonus:0,commBonus:0,recruitBonus:0},
      eventsTriggered: {},
      yellowTurban: false,
      armies: [],
      nextArmyId: 1
    };
    log('游戏开始！公元190年，乱世群雄并起。');
    renderAll();
  }

  function getSeason() { return SEASONS[(state.month-1)%4]; }
  function player() { return state.factions[state.playerId]; }
  function factionCities(fid) { return state.cities.filter(c=>c.owner===fid); }
  function factionGenerals(fid) { return state.generals.filter(g=>g.faction===fid); }
  function findCity(name) { return state.cities.find(c=>c.name===name); }
  function findGeneral(name) { return state.generals.find(g=>g.name===name); }
  function relation(a,b) { return state.relations[a][b]; }
  function setRelation(a,b,v) { state.relations[a][b]=state.relations[b][a]=Math.max(-100,Math.min(100,v)); }
  function factionArmies(fid) { return state.armies.filter(a=>a.faction===fid); }
  function findArmy(id) { return state.armies.find(a=>a.id===id); }
  function armyTroopTotal(a) { return a.infantry + a.cavalry + a.archer; }
  function availableGenerals(fid, armyId=null) {
    return state.generals.filter(g=>g.faction===fid && !g.injured && !state.armies.some(ar=>ar.id!==armyId && ar.generals.includes(g.name)));
  }

  function log(msg) {
    state.logs.unshift(`[${state.year}年${state.month}月] ${msg}`);
    if(state.logs.length>50) state.logs.pop();
    renderLogs();
  }

  function renderLogs() {
    const el = document.getElementById('logs');
    el.innerHTML = state.logs.slice(0,20).map(m=>`<div class="log-entry">${m}</div>`).join('');
  }

  function renderHeader() {
    const p = player();
    document.getElementById('h-res').innerHTML = `
      <span class="res-item" style="color:#1a5c1a">粮食:${Math.floor(p.food)}</span>
      <span class="res-item" style="color:#b8860b">金钱:${Math.floor(p.gold)}</span>
      <span class="res-item" style="color:#c41e3a">兵力:${Math.floor(p.troops)}</span>
      <span class="res-item">士气:${Math.floor(p.morale)}</span>`;
    document.getElementById('h-date').innerText = `第${state.year}年 ${state.month}月 第${state.turn}回合`;
    document.getElementById('h-season').innerHTML = `季节:<b>${getSeason()}</b>`;
  }

  function renderSidebar() {
    const tabs = [
      {id:'internal',label:'内政'},
      {id:'military',label:'军事'},
      {id:'talent',label:'人才'},
      {id:'diplomacy',label:'外交'},
      {id:'map',label:'地图'},
      {id:'logs',label:'日志'}
    ];
    const sb = document.getElementById('sidebar');
    sb.innerHTML = tabs.map(t=>`<button class="${selectedTab===t.id?'active':''}" onclick="window.switchTab('${t.id}')">${t.label}</button>`).join('') +
      `<hr style="width:100%;border-color:var(--border)">` +
      `<button onclick="window.saveGame()">保存游戏</button>` +
      `<button onclick="window.loadGame()">读取游戏</button>` +
      `<button onclick="window.nextTurn()" style="background:var(--accent-green);color:#fff;border-color:var(--accent-green)">结束回合</button>`;
  }

  window.switchTab = (id)=>{ selectedTab=id; renderContent(); renderSidebar(); };

  function renderContent() {
    const c = document.getElementById('content');
    if(state.gameOver) {
      const msg = state.winner===state.playerId ? '恭喜统一天下！' : (state.winner ? `${state.factions[state.winner] ? state.factions[state.winner].name : state.winner} 一统天下，你失败了。` : '你的势力覆灭了。');
      c.innerHTML = `<div class="card"><h2>${msg}</h2><button class="action" onclick="window.initGame()">重新开始</button></div>`;
      return;
    }
    switch(selectedTab){
      case 'internal': renderInternal(c); break;
      case 'military': renderMilitary(c); break;
      case 'talent': renderTalent(c); break;
      case 'diplomacy': renderDiplomacy(c); break;
      case 'map': renderMap(c); break;
      case 'logs': renderLogPage(c); break;
    }
  }

  function renderInternal(c) {
    const p = player();
    const season = getSeason();
    c.innerHTML = `
      <div class="card"><h3>内政中心 · 当前季节：${season}</h3>
      <p>拥有城池：${factionCities(state.playerId).length}座 · 武将：${factionGenerals(state.playerId).length}人</p>
      <button class="action" onclick="window.doInternal('farm')" ${p.gold<200?'disabled':''}>开垦农田 (200金)</button>
      <button class="action" onclick="window.doInternal('comm')" ${p.gold<200?'disabled':''}>发展商业 (200金)</button>
      <button class="action" onclick="window.doInternal('recruit')" ${p.gold<150||p.food<200?'disabled':''}>招兵买马 (150金+200粮)</button>
      <button class="action" onclick="window.doInternal('search')" ${p.gold<300?'disabled':''}>寻访人才 (300金)</button>
      <button class="action" onclick="window.doInternal('heal')" ${p.gold<200||!factionGenerals(state.playerId).some(g=>g.injured)?'disabled':''}>医治伤员 (200金)</button>
      <button class="action" onclick="window.doInternal('morale')" ${p.gold<150?'disabled':''}>提升民心 (150金)</button>
      <button class="action" onclick="window.doInternal('tech')" ${p.gold<500?'disabled':''}>研发科技 (500金)</button>
      </div>
      <div class="card"><h3>城池产出</h3>
      <table><tr><th>城池</th><th>粮食产出</th><th>金钱产出</th><th>民心</th><th>守军</th></tr>
      ${factionCities(state.playerId).map(city=>`<tr><td>${city.name}</td><td>${city.food}</td><td>${city.money}</td><td>${city.morale}</td><td>${Math.floor(city.troops)}</td></tr>`).join('')}
      </table></div>`;
  }

  window.doInternal = (type)=>{
    const p = player();
    const cities = factionCities(state.playerId);
    if(type==='farm' && p.gold>=200){
      p.gold-=200; cities.forEach(c=>c.food+=15); log('开垦农田，各城粮食产出+15');
    }else if(type==='comm' && p.gold>=200){
      p.gold-=200; cities.forEach(c=>c.money+=12); log('发展商业，各城金钱产出+12');
    }else if(type==='recruit' && p.gold>=150 && p.food>=200){
      p.gold-=150; p.food-=200; const add = Math.floor(100+Math.random()*101+state.tech.recruitBonus); p.troops+=add; log(`招兵买马，兵力+${add}`);
    }else if(type==='search' && p.gold>=300){
      p.gold-=300;
      if(Math.random()<0.4){
        const pool = state.generals.filter(g=>g.faction==='free');
        if(pool.length){
          const g = pool[Math.floor(Math.random()*pool.length)];
          g.faction=state.playerId; g.loyalty=70;
          log(`寻访到人才 ${g.name}，已加入麾下！`);
        }else log('寻访未果。');
      }else log('寻访未果。');
    }else if(type==='heal' && p.gold>=200){
      p.gold-=200; factionGenerals(state.playerId).forEach(g=>{g.injured=0;g.injuredTurns=0;}); log('医治伤员，所有武将恢复健康');
    }else if(type==='morale' && p.gold>=150){
      p.gold-=150; cities.forEach(c=>c.morale=Math.min(100,c.morale+10)); log('提升民心，各城民心+10');
    }else if(type==='tech' && p.gold>=500){
      p.gold-=500; const r=Math.random();
      if(r<0.33){state.tech.farmBonus+=10;log('研发农业科技，粮食产出额外+10/城');}
      else if(r<0.66){state.tech.commBonus+=8;log('研发商业科技，金钱产出额外+8/城');}
      else {state.tech.recruitBonus+=30;log('研发募兵科技，招兵额外+30');}
    }
    renderAll();
  };

  function renderMilitary(c) {
    const p = player();
    const pcities = factionCities(state.playerId);
    const myArmies = factionArmies(state.playerId);
    const availableGens = availableGenerals(state.playerId);

    let html = `<div class="card"><h3>军团管理</h3>`;
    html += `<p>可用兵力：${Math.floor(p.troops)} · 可用武将：${availableGens.length}人 · 军团上限：${pcities.length}</p>`;
    html += `<button class="action" onclick="window.openArmyEditor()">组建新军团</button>`;
    html += `</div>`;

    html += `<div class="card"><h3>我的军团</h3>`;
    if (myArmies.length === 0) {
      html += `<p>暂无军团，请组建军团后出征。</p>`;
    } else {
      html += `<table><tr><th>军团</th><th>驻扎</th><th>主将</th><th>将领</th><th>步兵</th><th>骑兵</th><th>弓兵</th><th>总兵力</th><th>操作</th></tr>`;
      myArmies.forEach(a => {
        const main = a.generals.length ? a.generals[0] : '-';
        html += `<tr>
          <td>${a.name}</td>
          <td>${a.city || '待命'}</td>
          <td>${main}</td>
          <td>${a.generals.join(', ') || '-'}</td>
          <td>${a.infantry}</td><td>${a.cavalry}</td><td>${a.archer}</td>
          <td>${armyTroopTotal(a)}</td>
          <td>
            <button class="action" onclick="window.openArmyEditor(${a.id})">调整</button>
            <button class="action" onclick="window.disbandArmy(${a.id})">解散</button>
          </td>
        </tr>`;
      });
      html += `</table>`;
    }
    html += `</div>`;

    html += `<div class="card"><h3>派军团出征</h3>`;
    if (myArmies.length === 0 || pcities.length === 0) {
      html += `<p>无可用军团或城池。</p>`;
    } else {
      html += `<div style="margin:8px 0">
        <label>军团：</label><select id="atk-army">${myArmies.map(a => `<option value="${a.id}">${a.name} (${armyTroopTotal(a)}人 @${a.city || '待命'})</option>`).join('')}</select>
        <label> 目标城：</label><select id="atk-to"><option>请先选军团</option></select>
        <button class="action" onclick="window.doArmyAttack()">出征</button>
      </div>`;
      html += `<div id="atk-preview"></div>`;
    }
    html += `</div>`;

    html += `<div class="card"><h3>城池驻防</h3>`;
    html += `<p>预备役：${Math.floor(p.troops)} · 单城守军上限 6000</p>`;
    if (pcities.length === 0) {
      html += `<p>无可驻防城池。</p>`;
    } else {
      html += `<div style="margin:8px 0">
        <label>城池：</label><select id="gar-city">${pcities.map(c=>`<option value="${c.name}">${c.name} (守军${Math.floor(c.troops)})</option>`).join('')}</select>
        <label> 数量：</label><input type="number" id="gar-num" value="500" min="100" step="100" style="width:90px">
        <button class="action" onclick="window.reinforceCity('in')">从预备役调兵驻防</button>
        <button class="action" onclick="window.reinforceCity('out')">撤回预备役</button>
      </div>`;
    }
    html += `</div>`;

    c.innerHTML = html;

    const armySel = document.getElementById('atk-army');
    const toSel = document.getElementById('atk-to');
    if (armySel && toSel) {
      const updateTargets = () => {
        const army = findArmy(parseInt(armySel.value));
        const fromCity = army && army.city ? findCity(army.city) : pcities[0];
        if (!fromCity) { toSel.innerHTML = '<option>无出发城池</option>'; return; }
        const opts = fromCity.neighbors.map(n => {
          const t = findCity(n);
          if (!t) return '';
          return `<option value="${n}">${n}${t.owner ? ' (' + state.factions[t.owner].name + ')' : ' (无主)'}</option>`;
        }).join('');
        toSel.innerHTML = opts || '<option>无相邻目标</option>';
      };
      armySel.addEventListener('change', updateTargets);
      updateTargets();
    }
  }

  window.reinforceCity = (dir)=>{
    const p = player();
    const cityName = document.getElementById('gar-city').value;
    const num = Math.max(0, parseInt(document.getElementById('gar-num').value)||0);
    const city = findCity(cityName);
    if(!city || city.owner!==state.playerId){ alert('请选择己方城池'); return; }
    if(num<100){ alert('数量至少100'); return; }
    if(dir==='in'){
      if(num>p.troops){ alert('预备役兵力不足'); return; }
      if(city.troops+num>6000){ alert('超过单城守军上限 6000'); return; }
      p.troops -= num; city.troops += num;
      log(`调 ${num} 兵力驻防 ${city.name}，守军达 ${Math.floor(city.troops)}`);
    }else{
      if(num>city.troops){ alert('城池守军不足'); return; }
      city.troops -= num; p.troops += num;
      log(`从 ${city.name} 撤回 ${num} 兵力至预备役`);
    }
    renderAll();
  };

  window.doArmyAttack = ()=>{
    if(state.gameOver) return;
    const armyId = parseInt(document.getElementById('atk-army').value);
    const toName = document.getElementById('atk-to').value;
    const army = findArmy(armyId);
    const target = findCity(toName);
    if(!army || !target) { alert('请选择有效军团和目标'); return; }
    if(target.owner===state.playerId) { alert('不能攻击己方城池'); return; }
    if(target.owner && relation(state.playerId,target.owner)>=80) { alert('不能攻击盟友'); return; }
    const fromCity = army.city ? findCity(army.city) : factionCities(state.playerId)[0];
    if(!fromCity || !fromCity.neighbors.includes(target.name)) { alert('目标不相邻'); return; }
    if(armyTroopTotal(army)<100) { alert('军团兵力不足'); return; }
    const mainGeneral = army.generals.length ? findGeneral(army.generals[0]) : null;
    if(mainGeneral && mainGeneral.injured) { alert('主将受伤中'); return; }
    if(target.owner) setRelation(state.playerId,target.owner,-100);
    armyBattle(state.playerId, target.owner||'neutral', army, target);
    renderAll();
  };

  function armyBattle(attackerId, defenderId, army, targetCity) {
    const total = armyTroopTotal(army);
    const mainGeneral = army.generals.length ? findGeneral(army.generals[0]) : null;
    const atkFaction = state.factions[attackerId];
    // Aggregate attack from all troop types
    let attack = 0;
    [['infantry',army.infantry],['cavalry',army.cavalry],['archer',army.archer]].forEach(([typeKey,troops])=>{
      if(troops<=0) return;
      const tt = TROOP_TYPES[typeKey];
      let base = troops * (0.5 + (mainGeneral?mainGeneral.force:50)/200) * (0.5 + (mainGeneral?mainGeneral.command:50)/200) * tt.atk;
      if(typeKey==='archer') base *= tt.siegeAtk;
      attack += base;
    });
    // General skills apply to aggregate attack
    let aMods = {forceMul:1, atkMul:1, moraleMul:1, defMul:1, woundExtra:0};
    let dMods = {forceMul:1, atkMul:1, moraleMul:1, defMul:1, woundExtra:0};
    if(mainGeneral && mainGeneral.skill && SKILLS[mainGeneral.skill] && typeof SKILLS[mainGeneral.skill].battle==='function') SKILLS[mainGeneral.skill].battle(aMods,dMods);
    attack *= aMods.forceMul * aMods.atkMul;

    const defGeneral = defenderId!=='neutral' ? factionGenerals(defenderId).filter(g=>!g.injured).sort((a,b)=>b.command-a.command)[0] : null;
    if(defGeneral && defGeneral.skill && SKILLS[defGeneral.skill] && typeof SKILLS[defGeneral.skill].battle==='function') SKILLS[defGeneral.skill].battle(dMods,aMods);

    let defense = targetCity.troops * 1.2 * targetCity.defense * dMods.defMul * dMods.moraleMul * (0.8+Math.random()*0.4);
    if(defGeneral) defense *= (0.5 + defGeneral.command/200);
    if(defGeneral && defGeneral.skill==='lianying') defense *= (1 + SKILLS.lianying.defend);
    if(state.eventsTriggered.chibi && attackerId==='cao' && (targetCity.name==='荆州'||targetCity.name==='扬州') && state.factions.sun.allies.includes('liu')) attack*=0.7;

    const victory = attack > defense;
    if(victory){
      const losses = Math.floor(total * 0.25);
      const survivors = total - losses;
      const garrison = Math.floor(survivors / 2);          // 留守部队
      const keepRatio = Math.max(0, (survivors - garrison) / total);
      army.infantry = Math.floor(army.infantry * keepRatio);
      army.cavalry = Math.floor(army.cavalry * keepRatio);
      army.archer = Math.floor(army.archer * keepRatio);
      targetCity.troops = garrison;
      const oldOwner = targetCity.owner;
      targetCity.owner = attackerId;
      targetCity.morale = Math.max(30, targetCity.morale - 20);
      army.city = targetCity.name;
      // 奸雄：战胜双倍金钱（攻方主将特技）
      const reward = 200 * (mainGeneral && mainGeneral.skill==='jianxiong' ? SKILLS.jianxiong.rewardGold : 1);
      atkFaction.gold += reward;
      if(mainGeneral && mainGeneral.skill==='huoji') targetCity.troops = Math.floor(targetCity.troops*(1 - SKILLS.huoji.fire));
      log(`${atkFaction.name} 的 ${army.name}(${mainGeneral?mainGeneral.name:'无将'}) 攻占了 ${targetCity.name}！损失 ${losses} 兵力`);
      if(oldOwner && state.factions[oldOwner] && factionCities(oldOwner).length===0) log(`${state.factions[oldOwner].name} 势力灭亡！`);
    }else{
      let losses = Math.floor(total * 0.4);
      const ratio = Math.max(0, (total - losses) / total);
      army.infantry = Math.floor(army.infantry * ratio);
      army.cavalry = Math.floor(army.cavalry * ratio);
      army.archer = Math.floor(army.archer * ratio);
      targetCity.troops = Math.floor(targetCity.troops * 0.85);
      if(mainGeneral){
        let woundChance = 0.3 + aMods.woundExtra;
        if(mainGeneral.skill && SKILLS[mainGeneral.skill].wound) woundChance *= SKILLS[mainGeneral.skill].wound;
        if(Math.random()<woundChance){ mainGeneral.injured=1; mainGeneral.injuredTurns=1+Math.floor(Math.random()*2); log(`${mainGeneral.name} 受伤，需休养 ${mainGeneral.injuredTurns} 月`); }
      }
      log(`${atkFaction.name} 的 ${army.name} 进攻 ${targetCity.name} 失败，损失 ${losses} 兵力`);
    }
  }

  function battle(attackerId, defenderId, general, atkTroops, targetCity, troopTypeKey) {
    const atkFaction = state.factions[attackerId];
    const troopType = TROOP_TYPES[troopTypeKey];
    const defTroops = targetCity.troops;
    let aMods = {forceMul:1, atkMul:1, moraleMul:1, defMul:1, woundExtra:0};
    let dMods = {forceMul:1, atkMul:1, moraleMul:1, defMul:1, woundExtra:0};
    if(general && general.skill && SKILLS[general.skill] && typeof SKILLS[general.skill].battle === 'function') SKILLS[general.skill].battle(aMods,dMods);
    const defGeneral = defenderId!=='neutral' ? factionGenerals(defenderId).filter(g=>!g.injured).sort((a,b)=>b.command-a.command)[0] : null;
    if(defGeneral && defGeneral.skill && SKILLS[defGeneral.skill] && typeof SKILLS[defGeneral.skill].battle === 'function') SKILLS[defGeneral.skill].battle(dMods,aMods);
    let attack = atkTroops * (0.5 + general.force/200 * aMods.forceMul) * (0.5 + general.command/200) * troopType.atk * aMods.atkMul;
    // Counter bonus
    const defTroopTypeKey = 'infantry';
    if(troopTypeKey==='cavalry' && defTroopTypeKey==='archer') attack*=1.2;
    if(troopTypeKey==='archer' && defTroopTypeKey==='infantry') attack*=1.2;
    if(troopTypeKey==='infantry' && defTroopTypeKey==='cavalry') attack*=1.2;
    // Siege bonus for archer
    if(troopTypeKey==='archer') attack *= troopType.siegeAtk;
    let defense = targetCity.troops * 1.2 * targetCity.defense * dMods.defMul * dMods.moraleMul * (0.8+Math.random()*0.4);
    if(defGeneral) defense *= (0.5 + defGeneral.command/200);
    if(defGeneral && defGeneral.skill==='lianying') defense *= (1 + SKILLS.lianying.defend);
    if(state.eventsTriggered.chibi && attackerId==='cao' && (targetCity.name==='荆州'||targetCity.name==='扬州') && state.factions.sun.allies.includes('liu')) attack*=0.7;

    // 部署出征兵力（从预备役扣除，避免攻城造兵）
    atkFaction.troops -= atkTroops;
    let victory = attack > defense;
    if(victory){
      const losses = Math.floor(atkTroops * 0.25);
      const survivors = atkTroops - losses;
      const garrison = Math.floor(survivors / 2);        // 留守部队
      atkFaction.troops += survivors - garrison;          // 其余存活兵力归还预备役
      targetCity.troops = garrison;
      const oldOwner = targetCity.owner;
      targetCity.owner = attackerId;
      targetCity.morale = Math.max(30, targetCity.morale - 20);
      // 奸雄：战胜双倍金钱（攻方主将特技）
      const reward = 200 * (general && general.skill==='jianxiong' ? SKILLS.jianxiong.rewardGold : 1);
      atkFaction.gold += reward;
      // 火计：攻城守军额外损失
      if(general && general.skill==='huoji') targetCity.troops = Math.floor(targetCity.troops*(1 - SKILLS.huoji.fire));
      log(`${atkFaction.name} 的 ${general.name} 攻占了 ${targetCity.name}！损失 ${losses} 兵力`);
      if(oldOwner && state.factions[oldOwner]){
        const old = state.factions[oldOwner];
        if(factionCities(oldOwner).length===0) log(`${old.name} 势力灭亡！`);
      }
    }else{
      const losses = Math.floor(atkTroops * 0.4);
      const survivors = atkTroops - losses;
      atkFaction.troops += survivors;                     // 败兵归还预备役
      targetCity.troops = Math.floor(defTroops * 0.85);
      let woundChance = 0.3 + aMods.woundExtra;
      // 龙胆：受伤概率减半
      if(general && general.skill && SKILLS[general.skill].wound) woundChance *= SKILLS[general.skill].wound;
      if(Math.random()<woundChance){ general.injured=1; general.injuredTurns=1+Math.floor(Math.random()*2); log(`${general.name} 受伤，需休养 ${general.injuredTurns} 月`); }
      log(`${atkFaction.name} 进攻 ${targetCity.name} 失败，损失 ${losses} 兵力`);
    }
  }

    const city = document.getElementById('army-city').value;

  function renderMap(c) {
    // Focused bounding box around playable area for 48 cities
    const mapBounds = { minX: 440, minY: 100, maxX: 2040, maxY: 1560 };
    const mapW = mapBounds.maxX - mapBounds.minX;
    const mapH = mapBounds.maxY - mapBounds.minY;
    function mapX(x) { return ((x - mapBounds.minX) / mapW) * 100; }
    function mapY(y) { return ((y - mapBounds.minY) / mapH) * 100; }

    // 连线（按城市名查邻居，坐标移动不影响连接关系）
    const linePairs = [];
    const drawn = new Set();
    state.cities.forEach(ct => {
      ct.neighbors.forEach(n => {
        const key = [ct.name, n].sort().join('-');
        if (drawn.has(key)) return;
        drawn.add(key);
        const t = findCity(n);
        if (!t) return;
        linePairs.push([ct.name, t.name]);
      });
    });

    // 先用原始坐标占位渲染，便于测量真实容器尺寸
    const nodesHtml = state.cities.map(ct => {
      const owner = ct.owner ? state.factions[ct.owner] : null;
      const ownerMark = owner ? ` [${owner.name.charAt(0)}]` : '';
      return `<div class="map-node" data-city="${ct.name}" style="left:${mapX(ct.x)}%;top:${mapY(ct.y)}%" onclick="window.switchTab('military')" title="${ct.name} 守军${Math.floor(ct.troops)}">
        <span class="n-name">${ct.name}${ownerMark}</span>
        <span class="n-troops">守:${Math.floor(ct.troops)} 民:${ct.morale}</span>
      </div>`;
    }).join('');
    const linesHtml = linePairs.map(() => `<line x1="0" y1="0" x2="0" y2="0" stroke="#a07c5a" stroke-width="2" stroke-linecap="round"/>`).join('');

    let html = `
      <div class="card">
        <h3>天下地图</h3>
        <div class="map-wrapper">
          <svg class="map-lines" preserveAspectRatio="none">
            ${linesHtml}
          </svg>
          <div class="map-region-label" style="left:52%;top:18%">北方</div>
          <div class="map-region-label" style="left:72%;top:42%">中原</div>
          <div class="map-region-label" style="left:62%;top:78%">南方</div>
          <div class="map-region-label" style="left:18%;top:72%">西蜀</div>
          ${nodesHtml}
        </div>
      </div>
      <div class="card"><h3>城池数据</h3>
      <table><tr><th>城池</th><th>区域</th><th>归属</th><th>守军</th><th>城防</th><th>粮食</th><th>金钱</th><th>民心</th></tr>
      ${state.cities.map(ct=>{
        const owner = ct.owner ? `<span class="faction-dot" style="background:${state.factions[ct.owner].color}"></span>${state.factions[ct.owner].name}` : '无主';
        return `<tr><td>${ct.name}</td><td>${ct.region}</td><td>${owner}</td><td>${Math.floor(ct.troops)}</td><td>${ct.defense}</td><td>${ct.food}</td><td>${ct.money}</td><td>${ct.morale}</td></tr>`;
      }).join('')}
      </table></div>
      <div class="card"><h3>势力图例</h3>
      ${Object.values(state.factions).filter(f=>!f.eliminated).map(f=>`<span style="margin-right:16px"><span class="faction-dot" style="background:${f.color}"></span>${f.name} · 城池${factionCities(f.id).length} · 兵力${Math.floor(f.troops)}</span>`).join('')}
      </div>`;
    c.innerHTML = html;

    // ---- 抗重叠：测量真实容器尺寸后在真实像素空间迭代推开重叠节点 ----
    const wrap = c.querySelector('.map-wrapper');
    const W = wrap.clientWidth || 900;
    const H = wrap.clientHeight || (W * 10 / 16);
    const NODE_HW = 30, NODE_HH = 17;   // 节点真实半宽/半高（含少量间距）
    const pts = {};
    state.cities.forEach(ct => {
      pts[ct.name] = { x: mapX(ct.x) * W / 100, y: mapY(ct.y) * H / 100 };
    });
    const names = Object.keys(pts);
    for (let iter = 0; iter < 120; iter++) {
      let moved = false;
      for (let i = 0; i < names.length; i++) {
        for (let j = i + 1; j < names.length; j++) {
          const a = pts[names[i]], b = pts[names[j]];
          const dx = b.x - a.x, dy = b.y - a.y;
          const ox = NODE_HW * 2 - Math.abs(dx);   // 水平重叠量
          const oy = NODE_HH * 2 - Math.abs(dy);   // 垂直重叠量
          if (ox > 0 && oy > 0) {
            moved = true;
            if (ox < oy) {                          // 沿重叠较小的轴推开
              const s = (dx >= 0 ? 1 : -1) * ox / 2;
              a.x -= s; b.x += s;
            } else {
              const s = (dy >= 0 ? 1 : -1) * oy / 2;
              a.y -= s; b.y += s;
            }
          }
        }
      }
      if (!moved) break;
    }
    // 夹到容器内并换算百分比
    const posPct = {};
    names.forEach(n => {
      const lx = Math.max(NODE_HW, Math.min(W - NODE_HW, pts[n].x)) / W * 100;
      const ty = Math.max(NODE_HH, Math.min(H - NODE_HH, pts[n].y)) / H * 100;
      posPct[n] = { left: lx, top: ty };
    });
    // 应用到节点
    state.cities.forEach(ct => {
      const el = wrap.querySelector(`[data-city="${ct.name}"]`);
      if (el) { el.style.left = posPct[ct.name].left + '%'; el.style.top = posPct[ct.name].top + '%'; }
    });
    // 应用到连线
    const lineEls = wrap.querySelectorAll('svg line');
    linePairs.forEach((pair, i) => {
      const el = lineEls[i];
      if (!el) return;
      const p1 = posPct[pair[0]], p2 = posPct[pair[1]];
      el.setAttribute('x1', p1.left + '%'); el.setAttribute('y1', p1.top + '%');
      el.setAttribute('x2', p2.left + '%'); el.setAttribute('y2', p2.top + '%');
    });
  }

  window.nextTurn = ()=>{
    if(state.gameOver) return;
    state.month++; state.turn++;
    if(state.month>12){ state.month=1; state.year++; }
    // Wound recovery
    state.generals.forEach(g=>{
      if(g.injured){
        g.injuredTurns--;
        if(g.injuredTurns<=0){ g.injured=0; if(g.faction===state.playerId) log(`${g.name} 伤愈复出`); }
      }
    });
    // Resource settlement
    Object.values(state.factions).forEach(f=>{
      if(f.eliminated) return;
      const cities = factionCities(f.id);
      // 天命：拥有该特技的武将使民心衰减减半
      const hasTianming = state.generals.some(g=>g.faction===f.id && !g.injured && g.skill==='tianming');
      const moraleDecay = hasTianming ? SKILLS.tianming.moraleDecay : 1;
      let foodGain=0, goldGain=0;
      cities.forEach(c=>{
        let fmul = c.morale/100, gmul = c.morale/100;
        const season = getSeason();
        if(season==='春') fmul*=1.2;
        if(season==='秋') fmul*=1.3;
        foodGain += c.food * fmul + state.tech.farmBonus;
        goldGain += c.money * gmul + state.tech.commBonus;
        if(season==='夏' && Math.random()<0.3) c.troops += Math.floor(20 * (1 + 0.2));
        c.morale = Math.max(20, Math.min(100, c.morale - moraleDecay));
      });
      f.food += foodGain; f.gold += goldGain;
      // 粮食消耗：预备役 + 城池守军均吃粮
      const garrisonTotal = cities.reduce((s,c)=>s+c.troops,0);
      const consume = Math.floor((f.troops + garrisonTotal)/100)*20;
      f.food -= consume;
      if(f.food<0){
        const decay = Math.floor(Math.abs(f.food)/5);
        f.troops = Math.max(0, f.troops-decay);
        if(f.id===state.playerId) log(`粮食不足，兵力衰减 ${decay}`);
        f.food=0;
      }
      // 预备役上限：按城池数量独立计算（不再反向依赖守军）
      f.troops = Math.min(f.troops, cities.length*3000);
      // Food consumption for field armies
      const myArmies = factionArmies(f.id);
      myArmies.forEach(a=>{
        const foodNeed = Math.floor(armyTroopTotal(a)/100) * (a.infantry*1 + a.cavalry*1.5 + a.archer*1.1) / armyTroopTotal(a) * 20;
        f.food -= foodNeed;
      });
    });
    // AI turns
    Object.values(state.factions).filter(f=>f.ai && !f.eliminated).forEach(f=>{
      aiTurn(f);
      aiArmyAttack(f);
    });
    // Historical events
    historicalEvents();
    // Random yearly event
    if(state.month===1) randomEvent();
    // Relation fluctuations
    Object.values(state.factions).forEach(a=>{
      if(a.eliminated) return;
      Object.values(state.factions).forEach(b=>{
        if(b.eliminated || a.id===b.id) return;
        if(Math.random()<0.15){
          setRelation(a.id,b.id,relation(a.id,b.id)+(Math.random()<0.5?-5:5));
        }
      });
    });
    checkEliminations();
    checkVictory();
    saveAuto();
    renderAll();
  };

  function aiTurn(f) {
    const cities = factionCities(f.id);
    // 民心维护：抵消每回合衰减，避免 AI 城池民心崩到 20
    if(cities.length && f.gold>100){
      f.gold -= 20;
      cities.forEach(c=>c.morale = Math.min(100, c.morale + 3));
    }
    // Recruit
    if(f.gold>500 && f.food>=200 && f.troops<2000 && cities.length){
      f.gold-=150; f.food-=200; const add=100+Math.floor(Math.random()*101); f.troops+=add;
    }
    // Develop
    if(f.personality==='conservative' && f.gold>400 && cities.length){
      f.gold-=200; cities.forEach(c=>c.food+=15);
    }
    // Diplomatic AI ally
    if(f.personality==='diplomatic' && Math.random()<0.4){
      const candidates = Object.values(state.factions).filter(o=>o.id!==f.id && relation(f.id,o.id)>30 && !f.allies.includes(o.id));
      if(candidates.length){
        const t = candidates[Math.floor(Math.random()*candidates.length)];
        f.gold-=500; setRelation(f.id,t.id,relation(f.id,t.id)+30);
        f.allies.push(t.id); t.allies.push(f.id);
        log(`${f.name} 与 ${t.name} 结为盟友`);
      }
    }
    // Attack
    if(f.personality==='expansion' || (f.personality==='diplomatic' && Math.random()<0.3)){
      const myCities = factionCities(f.id);
      const targets = [];
      myCities.forEach(c=>{
        c.neighbors.forEach(n=>{
          const t = findCity(n);
          if(t && t.owner!==f.id && (!t.owner || relation(f.id,t.owner)<80)){
            targets.push({from:c,to:t});
          }
        });
      });
      targets.sort((a,b)=>a.to.troops-b.to.troops);
        for(const atk of targets){
        if(f.troops>atk.to.troops*0.8 && f.troops>500){
          const gen = factionGenerals(f.id).filter(g=>!g.injured).sort((a,b)=>b.force-a.force)[0];
          if(gen){
            const use = Math.min(f.troops, Math.max(500, Math.floor(atk.to.troops*1.2)));
            battle(f.id, atk.to.owner||'neutral', gen, use, atk.to, 'infantry');
            if(Math.random()<0.7) break;
          }
        }
      }
    }
    // Distribute troops to cities and auto-create armies for AI
    if(cities.length && f.troops>0){
      const per = Math.floor(f.troops/cities.length);
      cities.forEach(c=>{ c.troops += per; });
      f.troops -= per*cities.length;
    }
    // Auto-create or replenish one army per city if enough troops
    const myArmies = factionArmies(f.id);
    cities.forEach(city=>{
      const stationed = myArmies.filter(a=>a.city===city.name);
      if(stationed.length===0 && city.troops>=500){
        const gens = availableGenerals(f.id).filter(g=>g.faction===f.id && !g.injured).sort((a,b)=>b.force-a.force).slice(0,3).map(g=>g.name);
        const use = Math.min(city.troops, 1500);
        state.armies.push({id:state.nextArmyId++, faction:f.id, name:`${city.name}军`, city:city.name, generals:gens, infantry:Math.floor(use*0.6), cavalry:Math.floor(use*0.25), archer:Math.floor(use*0.15)});
        city.troops -= use;
      } else if(stationed.length && city.troops>=300){
        const a = stationed[0];
        const add = Math.min(city.troops-200, 500);
        a.infantry += Math.floor(add*0.6); a.cavalry += Math.floor(add*0.25); a.archer += Math.floor(add*0.15);
        city.troops -= add;
      }
    });
  }

  function aiArmyAttack(f) {
    if(f.personality==='expansion' || (f.personality==='diplomatic' && Math.random()<0.3)){
      const myArmies = factionArmies(f.id).filter(a=>armyTroopTotal(a)>=500);
      const targets = [];
      myArmies.forEach(a=>{
        const city = a.city ? findCity(a.city) : null;
        if(!city) return;
        city.neighbors.forEach(n=>{
          const t = findCity(n);
          if(t && t.owner!==f.id && (!t.owner || relation(f.id,t.owner)<80)){
            targets.push({army:a,to:t});
          }
        });
      });
      targets.sort((a,b)=>a.to.troops-b.to.troops);
      for(const atk of targets){
        // 主将受伤则跳过该军团
        const mg = atk.army.generals.length ? findGeneral(atk.army.generals[0]) : null;
        if(mg && mg.injured) continue;
        if(armyTroopTotal(atk.army)>atk.to.troops*0.6){
          if(atk.to.owner) setRelation(f.id,atk.to.owner,-100);
          armyBattle(f.id, atk.to.owner||'neutral', atk.army, atk.to);
          if(Math.random()<0.6) break;
        }
      }
    }
  }

  function historicalEvents() {
    const y = state.year;
    // Yellow Turban
    if(y>=2 && y<=4 && !state.eventsTriggered.yellowTurban && Math.random()<0.25){
      state.eventsTriggered.yellowTurban=true;
      const free = state.cities.filter(c=>!c.owner);
      if(free.length){
        const c = free[Math.floor(Math.random()*free.length)];
        c.owner='huangjin'; c.troops=3000; c.morale=50;
        state.factions.huangjin = {id:'huangjin',name:'黄巾军',color:'#d4af37',leader:'张角',personality:'expansion',ai:true,food:500,gold:200,troops:0,morale:60,allies:[],eliminated:false};
        state.relations.huangjin={}; Object.keys(state.factions).forEach(k=>{state.relations.huangjin[k]=-50;state.relations[k].huangjin=-50;});
        log(`黄巾起义爆发！张角占据 ${c.name}，建立黄巾军势力！`);
      }
    }
    // Guandu
    if(y>=4 && y<=6 && !state.eventsTriggered.guandu && Math.random()<0.3){
      state.eventsTriggered.guandu=true;
      setRelation('cao','yuan',-100);
      log('官渡之战：曹操与袁绍正式宣战！');
    }
    // San gu maolu
    if(y>=3 && y<=5 && !state.eventsTriggered.sangu && player().id==='liu' && !factionGenerals('liu').some(g=>g.name==='诸葛亮')){
      state.eventsTriggered.sangu=true;
      const zg = findGeneral('诸葛亮');
      if(zg && zg.faction!=='liu'){ zg.faction='liu'; zg.loyalty=100; log('三顾茅庐：诸葛亮出山，辅佐刘备！'); }
    }
    // Chibi
    if(y>=6 && y<=8 && !state.eventsTriggered.chibi){
      state.eventsTriggered.chibi=true;
      log('赤壁之战：曹操南征，孙刘联盟抗曹！');
    }
    // Diyi shijinzhou
    if(y>=8 && y<=12 && !state.eventsTriggered.jingzhouLost){
      const guanyu = findGeneral('关羽');
      const jz = findCity('荆州');
      if(guanyu && guanyu.faction==='liu' && jz.owner==='liu' && Math.random()<0.2){
        state.eventsTriggered.jingzhouLost=true;
        jz.owner='sun'; jz.troops=Math.floor(jz.troops*0.7);
        log(`大意失荆州：孙权偷袭荆州，关羽败走麦城！`);
      }
    }
    // Baimenlou
    if(y>=5 && y<=8 && !state.eventsTriggered.baimenlou && state.factions.lv && !state.factions.lv.eliminated){
      if(Math.random()<0.25){
        state.eventsTriggered.baimenlou=true;
        factionCities('lv').forEach(c=>{c.owner='cao';c.morale=50;});
        log('白门楼：吕布兵败被杀，城池尽归曹操！');
      }
    }
    // Wuzhangyuan
    if(y>=15 && y<=17 && !state.eventsTriggered.wuzhangyuan){
      const zg = findGeneral('诸葛亮');
      if(zg && zg.faction===state.playerId && Math.random()<0.3){
        state.eventsTriggered.wuzhangyuan=true;
        zg.injured=1; zg.injuredTurns=99;
        log('五丈原：诸葛亮星落秋风，英年早逝！');
      }
    }
    // Three Kingdoms to Jin
    if(y>=20 && y<=25 && !state.eventsTriggered.sanguiguijin){
      const smy = findGeneral('司马懿');
      const sf = smy && smy.faction!==state.playerId ? state.factions[smy.faction] : null;
      if(sf && !sf.eliminated && Math.random()<0.2){
        state.eventsTriggered.sanguiguijin=true;
        log(`三国归晋：司马氏篡${sf.name}，天下终归晋朝！`);
        state.gameOver=true; state.winner=smy.faction;
      }
    }
  }

  function randomEvent() {
    const r = Math.random();
    const cities = state.cities;
    if(r<0.2){
      const c = cities[Math.floor(Math.random()*cities.length)];
      c.food += 50; log(`丰收：${c.name} 粮食大增`);
    }else if(r<0.35){
      const c = cities[Math.floor(Math.random()*cities.length)];
      c.troops = Math.max(0, c.troops-300); c.morale-=10; log(`瘟疫：${c.name} 守军大损`);
    }else if(r<0.5){
      const c = cities[Math.floor(Math.random()*cities.length)];
      c.troops = Math.max(0, c.troops-200); log(`山贼袭扰：${c.name} 守军减少`);
    }else if(r<0.65){
      const c = cities[Math.floor(Math.random()*cities.length)];
      c.money += 100; log(`商路繁荣：${c.name} 金钱增加`);
    }else{
      log('这一年天下相对太平。');
    }
  }

  function checkEliminations() {
    Object.values(state.factions).forEach(f=>{
      if(f.eliminated || f.id===state.playerId) return;
      if(factionCities(f.id).length===0 && factionArmies(f.id).length===0){
        f.eliminated = true;
        f.ai = false;
        // 从所有势力的盟友列表中移除
        Object.values(state.factions).forEach(o=>{ o.allies = o.allies.filter(a=>a!==f.id); });
        log(`${f.name} 势力已彻底灭亡，退出群雄之争。`);
      }
    });
  }

  function checkVictory() {
    const p = player();
    const total = state.cities.length;
    const mine = factionCities(state.playerId).length;
    if(mine>=Math.ceil(total*0.85)){ state.gameOver=true; state.winner=state.playerId; log('统一天下！你赢得了胜利！'); return; }
    if(mine===0 || (p.food<=0 && p.gold<=0 && p.troops<=0)){
      state.gameOver=true; state.winner=null; log('你的势力覆灭了。');
    }
  }

  function saveAuto() {
    try{ localStorage.setItem('sanguo_slg_autosave', JSON.stringify(serializeState())); }catch(e){}
  }

  window.saveGame = ()=>{
    try{
      localStorage.setItem('sanguo_slg_save', JSON.stringify(serializeState()));
      log('游戏已手动保存。');
    }catch(e){ log('保存失败：'+e.message); }
  };

  window.loadGame = ()=>{
    try{
      const data = localStorage.getItem('sanguo_slg_save') || localStorage.getItem('sanguo_slg_autosave');
      if(!data){ log('没有存档。'); return; }
      deserializeState(JSON.parse(data));
      log('游戏已读取。');
      renderAll();
    }catch(e){ log('读档失败：'+e.message); }
  };

  function serializeState() {
    return JSON.parse(JSON.stringify(state));
  }

  function deserializeState(data) {
    state = data;
    if(!state.nextArmyId) state.nextArmyId = (state.armies||[]).reduce((m,a)=>Math.max(m,a.id||0),0)+1;
    if(!state.armies) state.armies = [];
    // Rebuild faction list if huangjin exists
    if(!state.factions.huangjin && state.cities.some(c=>c.owner==='huangjin')){
      state.factions.huangjin = {id:'huangjin',name:'黄巾军',color:'#d4af37',leader:'张角',personality:'expansion',ai:true,food:500,gold:200,troops:0,morale:60,allies:[]};
    }
    // 兼容旧存档：补齐 eliminated 标志与 allies 数组
    Object.values(state.factions).forEach(f=>{
      if(f.eliminated===undefined) f.eliminated=false;
      if(!Array.isArray(f.allies)) f.allies=[];
    });
    // Ensure relations matrix covers all factions
    const ids = Object.keys(state.factions);
    ids.forEach(a=>{
      if(!state.relations[a]) state.relations[a]={};
      ids.forEach(b=>{
        if(state.relations[a][b]===undefined) state.relations[a][b]=a===b?100:20;
      });
    });
  }

  window.onerror = (msg)=>{ log('系统错误：'+msg); return true; };
  window.initGame = initState;

  initState();
})();
</script>
